name: Test

on:
  push:
    branches: ["**"]
    tags: ["**"]
    paths-ignore:
    - releases/**
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Init cape-sdks submodule
      run: git submodule update --init cape-sdks

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.11.6"
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --frozen --dev --extra fuzzing --extra acv

    - name: Install pip in the venv (Pulumi Python runtime uses pip for dep discovery)
      run: uv pip install pip

    - name: Download Kubernetes provider schema
      run: |
        mkdir -p examples/kubernetes
        pulumi package get-schema kubernetes > examples/kubernetes/schema.json

    - name: Register QEMU binfmt for cross-arch image checks
      run: docker run --privileged --rm tonistiigi/binfmt --install all

    - name: Install kubectl (runtime-check probe + amd64 deployment e2e)
      run: |
        curl -sSLo kubectl "https://dl.k8s.io/release/v1.32.1/bin/linux/amd64/kubectl"
        sudo install -m 0755 kubectl /usr/local/bin/kubectl
        kubectl version --client

    - name: isort
      run: uv run isort act/ tests/ --check --diff

    - name: black
      run: uv run black act/ tests/ --check --diff

    - name: flake8
      run: uv run flake8 --config ./.flake8 act/ tests/

    - name: mypy
      run: uv run mypy act/ tests/ --ignore-missing-imports --no-error-summary

    - name: pytest
      run: uv run pytest -v
