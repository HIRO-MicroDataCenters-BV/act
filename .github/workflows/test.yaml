name: Test

on:
  push:
    branches: ["**"]
    tags: ["**"]
    paths-ignore:
    - releases/**
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.11.6"
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --frozen --dev --extra fuzzing

    - name: isort
      run: uv run isort act/ --check --diff

    - name: black
      run: uv run black act/ --check --diff

    - name: flake8
      run: uv run flake8 --config ./.flake8 act/

    - name: mypy
      run: uv run mypy act/ --ignore-missing-imports --no-error-summary

    - name: pytest
      run: uv run pytest act/tests/ -v

  osv-scanner:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.2.1
