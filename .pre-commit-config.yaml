default_language_version:
  python: python3.11

default_stages: [pre-commit, pre-push]

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
    exclude: .*\.md
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files

- repo: https://github.com/koalaman/shellcheck-precommit
  rev: v0.11.0
  hooks:
  - id: shellcheck

- repo: local
  hooks:
  - id: isort
    name: isort
    entry: uv run isort act/ tests/
    language: system
    pass_filenames: false
    types: [python]

  - id: black
    name: black
    entry: uv run black act/ tests/
    language: system
    pass_filenames: false
    types: [python]

  - id: flake8
    name: flake8
    entry: uv run flake8 --config ./.flake8 act/ tests/
    language: system
    pass_filenames: false
    types: [python]

