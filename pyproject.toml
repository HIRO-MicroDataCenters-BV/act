[project]
name = "act"
version = "0.1.0"
description = "Automated Configuration Testing for CAPE Pulumi programs"
requires-python = ">=3.11"
dependencies = [
    "pulumi>=3.230.0",
    "pulumi-cape",
    "pytest>=9.0.3",
]

[tool.uv.workspace]
members = [
    "cape-sdks/python",
]

[tool.uv.sources]
pulumi-cape = { workspace = true }
